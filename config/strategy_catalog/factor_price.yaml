- seq: 304
  name: Short-Term Reversal Long
  description: Lehmann (1990) short-term reversal — go long the biggest 5-day losers within a
    liquid mega-cap universe (bottom-8 by 5-day return) while the name is still in a long-term
    uptrend (above SMA200), i.e. buy the pullback, not the falling knife. The relative-weakness
    rank is the edge; oversold names in an uptrend mean-revert. Uses the RANK_IN_UNIVERSE_BOTTOM
    DSL primitive (computed identically in backtest + live by cross_asset_primitives).
  strategy_type: mean_reversion
  market_regimes:
  - trending_up
  - trending_up_strong
  - trending_up_weak
  - ranging_low_vol
  - ranging
  entry_conditions:
  - RANK_IN_UNIVERSE_BOTTOM("SELF", ["AAPL","MSFT","GOOGL","AMZN","NVDA","META","AVGO","TSLA","JPM","V","MA","UNH","LLY","JNJ","XOM","CVX","HD","COST","PG","WMT"], 5, 8) > 0 AND CLOSE > SMA(100)
  exit_conditions:
  - CLOSE > SMA(20) OR RSI(14) > 70
  required_indicators:
  - SMA:100
  - SMA:20
  - RSI
  default_parameters:
    reversal_window_days: 5
    reversal_bottom_n: 8
    sma_period: 100
    rsi_period: 14
    stop_loss_pct: 0.06
    take_profit_pct: 0.10
    hold_period_max: 15
  expected_trade_frequency: 4-8 trades/month
  expected_holding_period: 2-10 days
  risk_reward_ratio: 1.67
