- seq: 305
  name: Low Volatility Factor Long
  description: Low-volatility / betting-against-beta factor (Frazzini & Pedersen 2014) — go long
    the calmest names (bottom-5 by 60-day realized volatility) of a liquid large-cap universe
    while in a confirmed long-term uptrend (above SMA200). The low-vol anomaly — low-risk names
    deliver higher risk-adjusted returns — is the edge; the SMA200 filter avoids holding a
    low-vol name that is quietly grinding down. Uses the RANK_LOW_VOL DSL primitive (computed in
    backtest + live by cross_asset_primitives).
  strategy_type: trend_following
  market_regimes:
  - trending_up
  - trending_up_strong
  - trending_up_weak
  - ranging_low_vol
  - ranging
  entry_conditions:
