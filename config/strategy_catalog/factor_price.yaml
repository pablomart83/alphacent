# AlphaCent strategy catalog — category: factor_price
# Price-based factor edges added 2026-06-16 (edge-gap analysis). All conditions use
# DSL primitives verified computable in BOTH backtest and live signal-gen
# (DONCHIAN_UPPER period-aware; LAG_RETURN/RANK_IN_UNIVERSE via cross_asset_primitives).
# Each must clear WF + MC like any template before it trades — adding them only lets
# the pipeline evaluate them.
- seq: 300
  name: Multi-Month High Momentum
  description: Buy when price is within 2% of its 120-day (6-month) high with a confirmed
    trend (ADX>20) and healthy-but-not-blowoff momentum (RSI 50-80). High-proximity momentum
    (George & Hwang 2004, 52-week-high effect) — lookback set to 120d so the signal has valid
    values inside the WF test window (a 252-day Donchian is all-NaN in a ~250-bar test split).
    RSI expressed as a range so it reads as a momentum filter, not an oversold entry.
  strategy_type: momentum
  market_regimes:
  - trending_up
  - trending_up_strong
  - trending_up_weak
  - ranging_low_vol
  entry_conditions:
  - CLOSE >= DONCHIAN_UPPER(120) * 0.98 AND ADX(14) > 20 AND RSI(14) > 50 AND RSI(14) < 80
  exit_conditions:
  - CLOSE < SMA(50) OR RSI(14) > 85
  required_indicators:
  - Donchian Upper:120
  - ADX
  - RSI
  - SMA:50
  default_parameters:
    donchian_period: 120
    adx_period: 14
    rsi_period: 14
    sma_period: 50
    stop_loss_pct: 0.08
    take_profit_pct: 0.16
    hold_period_max: 60
  expected_trade_frequency: 2-4 trades/month
  expected_holding_period: 10-40 days
  risk_reward_ratio: 2.0
  metadata:
    direction: long
  research_citation: George & Hwang (2004), Journal of Finance — The 52-Week High and Momentum Investing (lookback shortened to 120d for WF-window compatibility)
  author: alphacent-edge-2026-06-16
- seq: 302
  name: Dual Momentum Trend Long
  description: Antonacci dual momentum — combine absolute momentum (positive 6-month return)
    with a long-term trend filter (price above the 200-day SMA). Goes to cash in downtrends;
    captures sustained trends in equities/ETFs while avoiding bear markets.
  strategy_type: trend_following
  market_regimes:
  - trending_up
  - trending_up_strong
  - trending_up_weak
  - ranging_low_vol
  entry_conditions:
  - CLOSE > SMA(200) AND LAG_RETURN("SELF", 126, "1d") > 0.0
  exit_conditions:
  - CLOSE < SMA(200)
  required_indicators:
  - SMA:200
  default_parameters:
    sma_period: 200
    momentum_lookback_days: 126
    stop_loss_pct: 0.08
    take_profit_pct: 0.16
    hold_period_max: 120
  expected_trade_frequency: 1-2 trades/month
  expected_holding_period: 20-90 days
  risk_reward_ratio: 2.0
  metadata:
    direction: long
  research_citation: Antonacci (2014) — Dual Momentum Investing (absolute + relative momentum)
  author: alphacent-edge-2026-06-16
- seq: 303
  name: Cross-Asset Trend Follow Long
  description: Time-series momentum (managed-futures style) — go long when an instrument is in
    a confirmed 12-month uptrend (positive 252-day return) and above its 200-day SMA. Applied to
    indices/commodities/broad ETFs where per-symbol trend coverage is thin.
  strategy_type: trend_following
  market_regimes:
  - trending_up
  - trending_up_strong
  - trending_up_weak
  - ranging_low_vol
  - ranging
  entry_conditions:
  - CLOSE > SMA(200) AND LAG_RETURN("SELF", 252, "1d") > 0.0
  exit_conditions:
