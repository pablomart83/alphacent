- seq: 301
  name: Cross-Sectional Momentum Long
  description: Jegadeesh-Titman cross-sectional momentum — go long when the symbol ranks in the
    top 8 of a liquid mega-cap universe by 126-day (6-month) return AND is in its own uptrend
    (above SMA200). The relative-strength rank is the edge; the SMA200 filter blocks longing a
    top-relative name that is in an absolute downtrend. 126d window (not 252) to fit the WF test
    split. Uses the RANK_IN_UNIVERSE DSL primitive (computed in backtest+live by cross_asset_primitives).
  strategy_type: momentum
  market_regimes:
  - trending_up
  - trending_up_strong
  - trending_up_weak
  - ranging_low_vol
  entry_conditions:
  - RANK_IN_UNIVERSE("SELF", ["AAPL","MSFT","GOOGL","AMZN","NVDA","META","AVGO","TSLA","JPM","V","MA","UNH","LLY","JNJ","XOM","CVX","HD","COST","PG","WMT"], 126, 8) > 0 AND CLOSE > SMA(200)
  exit_conditions:
  - CLOSE < SMA(100)
  required_indicators:
  - SMA:200
  - SMA:100
  default_parameters:
    rank_window_days: 126
    rank_top_n: 8
    sma_period: 200
    stop_loss_pct: 0.08
    take_profit_pct: 0.16
    hold_period_max: 90
  expected_trade_frequency: 1-3 trades/month
  expected_holding_period: 20-60 days
  risk_reward_ratio: 2.0
  metadata:
    direction: long
    cross_sectional_rank: true
