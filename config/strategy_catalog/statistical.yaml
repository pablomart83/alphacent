- seq: 73
  name: End-of-Month Momentum Long
  description: Buy in the last 3 trading days of each month when price > SMA(20) and RSI > 40. Exit on
    the 3rd trading day of the next month. Captures institutional month-end rebalancing flows.
  strategy_type: momentum
  market_regimes:
  - trending_up
  - trending_up_strong
  - trending_up_weak
  - ranging
  - ranging_low_vol
  - ranging_high_vol
  entry_conditions:
  - Date is in last 3 trading days of month (day >= 26 approximation)
  - Price > SMA(20) — uptrend confirmation
  - RSI(14) > 40 — not oversold, momentum intact
  exit_conditions:
  - 3rd trading day of the next month (day >= 3 and new month)
  - 'Stop loss: 2% below entry'
  required_indicators:
  - SMA
  - RSI
  default_parameters:
    sma_period: 20
    rsi_period: 14
    rsi_min: 40
    month_end_day_threshold: 26
    exit_day_of_new_month: 3
    stop_loss_pct: 0.02
    take_profit_pct: 0.03
    hold_period_max: 10
  expected_trade_frequency: 1 trade/month
  expected_holding_period: 3-7 days
  risk_reward_ratio: 2.0
  metadata:
    direction: long
    strategy_category: statistical
    alpha_edge_type: end_of_month_momentum
    requires_fundamental_data: false
    disabled: true
    disable_reason: no_fundamental_edge_reclassified_from_alpha_edge
    best_symbols:
    - SPY
    - QQQ
    - IWM
    - DIA
    - VTI
    - VOO
    regime_preference:
    - trending_up
    - ranging_low_vol
