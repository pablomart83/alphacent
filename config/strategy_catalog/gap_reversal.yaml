- seq: 87
  name: Gap Down Reversal Long
  description: Buy when overnight gap down >2% with RSI < 40 and volume > 1.5x average. Works best on
    liquid large-caps where gaps tend to fill.
  strategy_type: mean_reversion
  market_regimes:
  - ranging
  - ranging_low_vol
  entry_conditions:
  - PRICE_CHANGE_PCT(1) < -2.0 AND RSI(14) < 40 AND VOLUME > VOLUME_MA(20) * 1.5
  exit_conditions:
  - PRICE_CHANGE_PCT(1) > 1.6 OR RSI(14) > 60
  required_indicators:
  - Price Change %
  - RSI
  - Volume MA
  default_parameters:
    gap_threshold_pct: -2.0
    rsi_period: 14
    rsi_entry_max: 40
    rsi_exit: 60
    volume_ma_period: 20
    volume_multiplier: 1.5
    gap_fill_pct: 0.8
    stop_loss_pct: 0.03
    take_profit_pct: 0.04
  expected_trade_frequency: 1-3 trades/month
  expected_holding_period: 1-3 days
  risk_reward_ratio: 2.0
  metadata:
    direction: long
    regime_preference:
    - ranging
    - ranging_low_vol
    strategy_category: gap_reversal
- seq: 88
  name: Gap Up Reversal Short
  description: Short when overnight gap up >2% with RSI > 65 and volume > 1.5x average. Gaps fill more
