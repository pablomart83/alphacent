- seq: 91
  name: OBV Bullish Divergence Long
  description: Buy when price makes new 20-day low but volume is below average (hidden accumulation —
    sellers exhausted). Exit when price returns to SMA(20) or RSI > 60. Stop loss 3%.
  strategy_type: mean_reversion
  market_regimes:
  - ranging
  - ranging_high_vol
  - trending_down_weak
  entry_conditions:
  - CLOSE < LOW_20 AND VOLUME < VOLUME_MA(20) * 0.8 AND RSI(14) < 40
  exit_conditions:
  - CLOSE > SMA(20) OR RSI(14) > 60
  required_indicators:
  - Support/Resistance
  - Volume MA
  - SMA
  - RSI
  default_parameters:
    support_lookback: 20
    volume_ma_period: 20
    sma_period: 20
    rsi_period: 14
    rsi_exit: 60
    stop_loss_pct: 0.03
    take_profit_pct: 0.05
  expected_trade_frequency: 1-3 trades/month
  expected_holding_period: 5-15 days
  risk_reward_ratio: 2.0
  metadata:
    direction: long
    regime_preference:
    - ranging
    - ranging_low_vol
    strategy_category: obv_divergence
