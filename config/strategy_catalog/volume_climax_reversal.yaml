- seq: 89
  name: Volume Climax Reversal Long
  description: Buy when volume spikes >3x 20-day average with RSI < 35, signaling panic selling exhaustion.
    Exit when RSI recovers or volume normalizes.
  strategy_type: mean_reversion
  market_regimes:
  - trending_up_strong
  - trending_up_weak
  - trending_down_strong
  - trending_down_weak
  - ranging_low_vol
  - ranging_high_vol
  - trending_up
  - trending_down
  - ranging
  entry_conditions:
  - VOLUME > VOLUME_MA(20) * 2.0 AND RSI(14) < 40
  exit_conditions:
  - RSI(14) > 55 OR VOLUME < VOLUME_MA(20) * 1.5
  required_indicators:
  - Volume MA
  - RSI
  default_parameters:
    volume_ma_period: 20
    volume_climax_multiplier: 3.0
    volume_normalize_multiplier: 1.5
    rsi_period: 14
    rsi_entry_max: 35
    rsi_exit: 55
    stop_loss_pct: 0.04
    take_profit_pct: 0.06
  expected_trade_frequency: 1-2 trades/month
  expected_holding_period: 2-5 days
  risk_reward_ratio: 2.0
  metadata:
    direction: long
    strategy_category: volume_climax_reversal
