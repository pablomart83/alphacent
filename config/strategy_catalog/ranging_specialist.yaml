- seq: 58
  name: BB Mean Reversion Long Ranging
  description: Buy when price touches lower BB in a ranging market with RSI confirmation, sell at middle
    band. BB width filter confirms ranging.
  strategy_type: mean_reversion
  market_regimes:
  - ranging
  - ranging_low_vol
  entry_conditions:
  - CLOSE < BB_LOWER(20, 2) AND RSI(14) < 40 AND (BB_UPPER(20, 2) - BB_LOWER(20, 2)) / BB_MIDDLE(20, 2)
    < 0.08
  exit_conditions:
  - CLOSE > BB_MIDDLE(20, 2) OR RSI(14) > 60
  required_indicators:
  - Bollinger Bands
  - RSI
  default_parameters:
    bb_period: 20
    bb_std: 2.0
    rsi_period: 14
    rsi_entry_max: 40
    bb_width_threshold: 0.08
    stop_loss_pct: 0.02
    take_profit_pct: 0.03
  expected_trade_frequency: 2-4 trades/month
  expected_holding_period: 3-7 days
  risk_reward_ratio: 2.0
  metadata:
    direction: long
    regime_preference:
    - ranging
    - ranging_low_vol
    strategy_category: ranging_specialist
- seq: 59
  name: RSI Range Oscillator Long Ranging
  description: Buy when RSI drops below 35 in a non-trending market (ADX < 25 confirms no trend), exit
    when RSI recovers above 55.
  strategy_type: mean_reversion
  market_regimes:
  - ranging
  - ranging_low_vol
  entry_conditions:
  - RSI(14) < 35 AND CLOSE > SMA(50) * 0.95
  exit_conditions:
  - RSI(14) > 55
  required_indicators:
  - RSI
  - SMA:50
  default_parameters:
    rsi_period: 14
    rsi_entry: 35
    rsi_exit: 55
    sma_period: 50
    stop_loss_pct: 0.02
    take_profit_pct: 0.035
  expected_trade_frequency: 3-5 trades/month
  expected_holding_period: 3-7 days
  risk_reward_ratio: 2.0
  metadata:
    direction: long
    regime_preference:
    - ranging
    - ranging_low_vol
    strategy_category: ranging_specialist
- seq: 60
  name: Support Bounce Long Ranging
  description: Buy near recent support (price within 1% of 20-day low) with volume confirmation, exit
    at resistance (20-day high). Works in channels.
  strategy_type: mean_reversion
  market_regimes:
  - ranging
  - ranging_high_vol
  entry_conditions:
  - CLOSE < LOW_20 * 1.01 AND VOLUME > VOLUME_MA(20) AND RSI(14) < 45
  exit_conditions:
  - CLOSE > HIGH_20 * 0.98 OR RSI(14) > 65
  required_indicators:
  - RSI
  - Volume MA
  default_parameters:
    lookback_period: 20
    support_buffer_pct: 0.01
    resistance_buffer_pct: 0.02
    rsi_period: 14
    volume_period: 20
    stop_loss_pct: 0.025
    take_profit_pct: 0.04
  expected_trade_frequency: 2-3 trades/month
  expected_holding_period: 5-12 days
  risk_reward_ratio: 2.0
  metadata:
    direction: long
    regime_preference:
    - ranging
    - ranging_low_vol
    strategy_category: ranging_specialist
- seq: 61
  name: Stochastic Oversold Recovery Long Ranging
  description: Buy when Stochastic %K crosses above %D below 20 (recovery signal), exit when %K > 80.
    Best in ranging markets where oscillators are reliable.
  strategy_type: mean_reversion
  market_regimes:
  - ranging
  - ranging_high_vol
  entry_conditions:
  - STOCH(14) < 20 AND STOCH(14) > STOCH_SIGNAL(14)
  exit_conditions:
  - STOCH(14) > 80
  required_indicators:
  - Stochastic Oscillator
  default_parameters:
    stoch_period: 14
    oversold_threshold: 20
    overbought_threshold: 80
    stop_loss_pct: 0.02
    take_profit_pct: 0.04
  expected_trade_frequency: 2-4 trades/month
