  # 2026-05-02: Re-enabled the four most-liquid majors for rotational
  # strategies per Zarattini et al. "Catching Crypto Trends" (SSRN 5209907):
  # a rotational top-N portfolio needs ~5-6 coins minimum to capture the
  # factor. eToro's 1% commission (2% round-trip) is now modeled correctly
  # in backtests, and templates that can't clear ~3% total cost are filtered
  # out at template-load time. These four are majors with tight enough
  # spreads to support multi-day swing strategies at 6%+ TP.
