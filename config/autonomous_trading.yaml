llm:
  model: qwen2.5-coder:7b
  temperature: 0.7
autonomous:
  enabled: true
  watchlist_size: 5
  proposal_frequency: daily
  proposal_count: 200
  max_active_strategies: 200
  min_active_strategies: 10
  backtested_ttl_cycles: 168
autonomous_schedule:
  enabled: true
  frequency: daily
  day_of_week: saturday
  hour: 15
  minute: 15
activation_thresholds:
  min_sharpe: 1.0               # Raised from 0.4 — live data shows Sharpe 0.4-1.0 strategies have <30% live win rate
  min_sharpe_crypto: 0.5        # Raised from 0.1 — crypto WF data was corrupted (P0 fix); conservative floor
  min_sharpe_commodity: 0.5     # Raised from 0.3
  max_drawdown: 0.25
  min_win_rate: 0.45
  min_win_rate_crypto: 0.3
  min_win_rate_commodity: 0.35
  min_trades: 2
  min_trades_alpha_edge: 8      # Was 10 — alpha edge strategies are lower frequency by design
  min_trades_dsl: 8             # Was 15 — too strict; selective 1d strategies fire 6-10x/6mo
  min_trades_dsl_1h: 15          # Was 20 — 1h strategies with 15+ trades in 180d test window is sufficient
  min_trades_dsl_4h: 8          # Was 12 — 4h strategies in 180-day test window: 8 is sufficient
  min_trades_crypto_1d: 4       # Added 2026-05-02 — weekly/swing crypto templates produce 3-7 trades in 120d (thin liquidity); paired with min_sharpe_crypto=0.5 floor
  min_trades_crypto_4h: 4       # Added 2026-05-02 — same rationale for 4H crypto templates
  min_trades_commodity: 6       # Was 8 — commodities are inherently lower frequency
  min_return_per_trade:
    stock: 0.0015       # daily: ~7-30 day holds
    stock_4h: 0.0008    # 4h: shorter holds, lower per-trade target
    stock_1h: 0.0003    # 1h: high frequency, small per-trade is expected
    etf: 0.001
    etf_4h: 0.0005
    etf_1h: 0.0002
    forex: 0.0005
    forex_1h: 0.0001
    crypto: 0.04
    index: 0.001
    index_1h: 0.0002
    commodity: 0.0015
    commodity_4h: 0.0008
retirement_thresholds:
  max_sharpe: 0.0
  max_drawdown: 0.31
  min_win_rate: 0.28
  min_trades_for_evaluation: 10
retirement_logic:
  min_live_trades_before_evaluation: 5
  rolling_window_days: 60
  consecutive_failures_required: 3
  probation_period_days: 30
performance_feedback:
  feedback_lookback_days: 60
  min_trades_for_feedback: 5
  max_weight_adjustment: 1.5
  min_weight_adjustment: 0.4
  weight_decay_per_day: 0.01
validation_rules:
  rsi:
    entry_max: 65
    exit_min: 50
  stochastic:
    entry_max: 35
    exit_min: 70
  bollinger_bands:
    require_both_bands: false
  macd:
    allow_zero_cross: true
  signal_overlap:
    max_overlap_pct: 50
  entry_opportunities:
    min_entry_pct: 0.5
    min_trades_per_month: 0.25
    asset_class_thresholds:
      stock:
        min_entry_pct: 0.5
      etf:
        min_entry_pct: 0.3
      forex:
        min_entry_pct: 0.2
      crypto:
        min_entry_pct: 0.2
      index:
        min_entry_pct: 0.3
      commodity:
        min_entry_pct: 0.3
  indicators:
    min_indicators: 1
    max_indicators: 5
    allow_price_only: false
  conditions:
    min_entry_conditions: 1
    min_exit_conditions: 1
    max_conditions_per_type: 5
signal_generation:
  days: 120
  strategy_timeout: 120
  cache_ttl: 3500
  dynamic_symbol_additions: 0
  parallel_workers: 4
  supported_intervals:
  - 1d
  - 4h
  - 1h
  default_interval: 1h
backtest:
  days: 730
  warmup_days: 100
  min_trades: 5
  walk_forward:
    train_days: 365
    test_days: 180
    direction_aware_thresholds:
      default:
        min_return: 0.0
        min_sharpe: 0.3
        min_win_rate: 0.45
      ranging:
        long:
          min_return: -0.02
          min_sharpe: 0.15
          min_win_rate: 0.4
        short:
          min_return: 0.0
          min_sharpe: 0.3
          min_win_rate: 0.45
      trending_up:
        long:
          min_return: 0.0
          min_sharpe: 0.3
          min_win_rate: 0.45
        short:
          min_return: -0.02
          min_sharpe: 0.15
          min_win_rate: 0.4
      trending_down:
        long:
          min_return: -0.02
          min_sharpe: 0.15
          min_win_rate: 0.4
        short:
          min_return: 0.0
          min_sharpe: 0.3
          min_win_rate: 0.45
      high_vol:
        long:
          min_return: -0.01
          min_sharpe: 0.2
          min_win_rate: 0.42
        short:
          min_return: -0.01
          min_sharpe: 0.2
          min_win_rate: 0.42
  data_quality:
    min_days_required: 400
    fallback_days: 180
  transaction_costs:
    commission_per_share: 0.005
    commission_percent: 0.001
    slippage_percent: 0.0005
    spread_percent: 0.0002
    # Overnight financing: eToro charges ~0.02% per night on CFD positions (1x leverage).
    # Applied as: overnight_cost_pct * expected_holding_days at backtest time.
    # This is the single biggest cost gap vs live trading for multi-day holds.
    overnight_financing_pct_per_day: 0.0002  # 0.02% per night
    per_asset_class:
      stock:
        commission_percent: 0.0
        spread_percent: 0.0015
        slippage_percent: 0.0002
        overnight_financing_pct_per_day: 0.0002  # ~0.02%/night on CFDs
      etf:
        commission_percent: 0.0
        spread_percent: 0.0015
        slippage_percent: 0.0002
        overnight_financing_pct_per_day: 0.0002
      forex:
        commission_percent: 0.0
        spread_percent: 0.00015
        slippage_percent: 0.00005
        overnight_financing_pct_per_day: 0.0001  # Forex swap rates vary; 0.01% conservative
      crypto:
        commission_percent: 0.0
        spread_percent: 0.0038  # eToro crypto spread ~0.375% per side = 0.75% round-trip
        slippage_percent: 0.001
        overnight_financing_pct_per_day: 0.0  # Crypto: no overnight fee on eToro
      index:
        commission_percent: 0.0
        spread_percent: 0.00015
        slippage_percent: 0.0001
        overnight_financing_pct_per_day: 0.00015  # Indices: ~0.015%/night
      commodity:
        commission_percent: 0.0
        spread_percent: 0.0004
        slippage_percent: 0.0002
        overnight_financing_pct_per_day: 0.0002
  period_days: 730
  adaptive_risk:
    enabled: true
    # NOTE: ATR multipliers for SL and TP are hardcoded in
    # src/execution/order_executor.py (1.5× ATR SL, Wilder's standard;
    # TP from template risk_reward_ratio). Config keys previously here
    # (atr_sl_multiplier, atr_tp_multiplier) were never read — removed
    # 2026-05-01 to eliminate documentation-vs-code drift. If you need
    # to tune multipliers, edit order_executor.py and update the
    # steering file / Session_Continuation.md in the same change.
    min_sl_pct: 0.02
    max_sl_pct: 0.08
    min_tp_pct: 0.04
    max_tp_pct: 0.20
    min_reward_risk_ratio: 1.5  # Relaxed from 2.0 — mean-reversion at 65%+ WR is fine at 1.5:1
    # Note: trend-following strategies enforce 2:1 via strategy_proposer asset-class overrides
data_sources:
  financial_modeling_prep:
    enabled: true
    api_key: REPLACE_VIA_SECRETS_MANAGER
    rate_limit: 300
    rate_limit_period: 60
    cache_strategy: earnings_aware
    cache_duration: 604800
    earnings_aware_cache:
      default_ttl: 604800
      earnings_period_ttl: 86400
      earnings_calendar_ttl: 604800
  alpha_vantage:
    # Free tier: 25 req/day — exhausted in minutes during cache warming, provides nothing.
    # NEWS_SENTIMENT is the only valuable AV endpoint for quant use (pre-scored NLP sentiment).
    # Enable and upgrade to $50/month plan if/when news sentiment is wired into conviction scorer.
    enabled: false
    api_key: REPLACE_VIA_SECRETS_MANAGER
    rate_limit: 500
    cache_duration: 86400
  fred:
    enabled: true
    api_key: REPLACE_VIA_SECRETS_MANAGER
    cache_duration: 86400
  marketaux:
    enabled: true
    api_key: nwpVfgSsnX2V5wkzXatGNIBMPEwZQr7Cwk8J12Th
    # Free tier: 100 req/day. Sentiment cached in DB with TTL (6h-72h).
    # Priority queue: open positions > pending signals > earnings week > background fill
  yahoo_finance:
    enabled: true
    cache_duration: 3600
data_management:
  retention:
    historical_prices_days: 1000
    filter_logs_days: 90
    retired_strategy_days: 90
  sync_schedule:
    fmp_fundamentals_hours: 24
    fmp_earnings_days: 7
    yahoo_prices_hours: 24
    fmp_forex_hours: 24
