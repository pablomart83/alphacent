alpha_edge:
  max_active_strategies: 10
  # 2026-05-04 paper-trading threshold analysis (revision post deep-dive):
  # Initial 65 → 62 relaxation was based on incomplete data. Re-analysis
  # after full conviction backfill (661 trades) shows:
  #   - Scorer works at the top: ≥75 bucket has 2.28 RR, +$42/trade avg,
  #     +$11,639 total (100% of our net alpha + some)
  #   - 60-65 buckets are net-negative with 40-54% WR and RR < 0.5
  #   - Pearson corr(conv, pnl) = +0.18 — weak but positive
  # Reverted to 65. A proper "accept edge cases" solution comes via
  # position-sizing tiers (next session) — size ≥75 trades at 1.25-1.5x
  # rather than lowering the activation floor. That captures the alpha
  # without admitting the noise.
  min_conviction_score: 65
  min_holding_period_days: 3
  max_holding_period_days: 30
