  enabled: true
  min_long_pct: 30
  max_long_pct: 70
  min_short_pct: 20
  max_short_pct: 50
position_management:
  max_positions_per_symbol: 5
  max_long_pct: 0.75
  max_short_pct: 0.5
  max_portfolio_drawdown_pct: 0.15
  max_holding_period_days: 60
  max_holding_period_days_intraday: 2
  trailing_stops:
    enabled: true
    # Per-asset-class thresholds are used (defined in PositionManager.TRAILING_STOP_PARAMS):
    #   stocks:  3% activation, 5% distance
    #   etfs:    3% activation, 4% distance
    #   crypto:  6% activation, 8% distance
    #   forex:   2% activation, 3% distance
    #   commodities: 4% activation, 6% distance
    #   indices: 3% activation, 4% distance
    # These legacy fields are kept for backward compatibility but no longer override.
    activation_pct: 0.05
    distance_pct: 0.03
  partial_exits:
    enabled: true
    levels:
    - profit_pct: 0.18
      exit_pct: 0.33
  correlation_adjustment:
    enabled: true
    threshold: 0.7
    reduction_factor: 0.5
  regime_based_sizing:
    enabled: true
    multipliers:
      high_volatility: 0.5
      low_volatility: 1.2
      trending: 1.0
      trending_up_long: 1.25   # Size up longs in bull markets (shorts blocked by regime gate)
      ranging: 1.0
  portfolio_balance:
    enabled: true
    max_sector_exposure_pct: 0.4
    max_directional_exposure_pct: 0.65
    min_strategy_types: 1
  portfolio_var:
    enabled: true
    confidence: 0.95
    max_var_pct: 0.02        # Reject if 1-day 95% VaR > 2% of equity
    lookback_days: 252       # 1 year of daily returns
    min_history_days: 30     # Skip check if fewer than 30 equity snapshots
  drawdown_sizing:
    enabled: true
    threshold_5pct: 0.50     # 50% size reduction when drawdown > 5%
    threshold_10pct: 0.25    # 75% size reduction when drawdown > 10%
    lookback_days: 30        # Rolling peak over last 30 days
  vol_scaling:
    min_scale: 0.10          # Was 0.25 — properly shrink high-vol (crypto) positions
    max_scale: 1.50          # Was 2.50 — cap forex over-sizing
    confidence_min: 0.30     # Reject signals with confidence < 0.30 (safety net)
    max_symbol_pct: 0.05     # Hard cap: no symbol > 5% of equity
    sector_soft_cap_pct: 0.30  # Halve size if sector already > 30% of equity
  directional_quotas:
    enabled: true
    adjacent_regime_reserve_pct: 0.2
    ranging:
      min_long_pct: 0.70
      min_short_pct: 0.0
    ranging_low_vol:
      min_long_pct: 0.75
      min_short_pct: 0.0
    trending_up:
      min_long_pct: 0.80
      min_short_pct: 0.05   # Minimum 5% short — hedging floor even in bull markets
    trending_up_weak:
      min_long_pct: 0.75
      min_short_pct: 0.08   # Weak uptrend = elevated correction risk, maintain larger hedge
    trending_up_strong:
      min_long_pct: 0.85
      min_short_pct: 0.03   # Strong uptrend = smaller hedge, but never zero
    trending_down:
      min_long_pct: 0.2
      min_short_pct: 0.5
    trending_down_weak:
      min_long_pct: 0.3
      min_short_pct: 0.3
    high_volatility:
      min_long_pct: 0.3
      min_short_pct: 0.1
  order_management:
    cancel_stale_orders: true
    stale_order_hours: 24
    stale_order_timeout_hours: 24
