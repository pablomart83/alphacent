    revenue_growth_min: 0.1
    entry_delay_days: 2
    hold_period_days: 45
    profit_target: 0.1
    stop_loss: 0.05
  sector_rotation:
    enabled: true
    max_positions: 3
    rebalance_frequency_days: 30
    top_sectors: 3
    sectors:
    - XLE
    - XLF
    - XLK
    - XLU
    - XLV
    - XLI
    - XLP
    - XLY
  quality_mean_reversion:
    enabled: true
    market_cap_min: 10000000000
    min_roe: 0.15
    max_debt_equity: 0.5
    rsi_threshold: 45
    oversold_threshold: 30
    drawdown_threshold: 0.1
    profit_target: 0.05
    stop_loss: 0.03
  dividend_aristocrat:
    min_entry_gap_days: 180
    pullback_confirmation_pct: 0.05
    rsi_confirmation_threshold: 40
  insider_buying:
    min_net_purchases: 3
    lookback_days: 90
  end_of_month_momentum:
    enabled: true
  analyst_revision_momentum:
    min_revision_pct: 0.05
    min_consecutive_revisions: 2
    profit_target: 0.12
    stop_loss: 0.05
  share_buyback:
    min_buyback_pct: 0.01
    rsi_max_entry: 60
    profit_target: 0.1
    stop_loss: 0.05
  multi_factor_composite:
    enabled: true
    rebalance_frequency_days: 30
    top_pct: 20
    bottom_pct: 20
    min_f_score_long: 6
    max_f_score_short: 3
    max_accruals_long: 0.05
    min_accruals_short: 0.1
    factor_weights:
      value: 0.25
      quality: 0.3
      momentum: 0.2
      growth: 0.25
  fundamental_monitoring:
    enabled: true
    check_interval_hours: 24
    earnings_miss_threshold: -0.05
    revenue_decline_exit: true
    sector_rotation_exit: true
    # Regime stability: sector rotation exits only fire if regime has been
    # stable for this many days (prevents whipsawing on single-day blips)
    sector_rotation_regime_stability_days: 3
    # Only exit on earnings miss if position is profitable OR SL is > 50% consumed
    earnings_exit_only_if_profitable: true
