backtest:
  days: 730
  warmup_days: 100
  min_trades: 5
  walk_forward:
    # Fallback default. Only used when no asset_class_windows key matches
    # (e.g. a new asset_class / interval combo appears). The live windows
    # for every currently-supported combo are in asset_class_windows below.
    train_days: 365
    test_days: 180
    # ──────────────────────────────────────────────────────────────────
    # asset_class_windows — the live walk-forward windows that actually run
    # per (asset_class, interval, template). Single source of truth;
    # strategy_proposer._select_wf_window() reads these at cycle time.
    #
    # Data sources per (asset_class, interval):
    #   crypto 1h/4h/1d        → Binance primary (years of history)
    #   non-crypto 1h/4h       → FMP Starter primary, Yahoo fallback
    #   non-crypto 1d          → Yahoo (decades of daily history)
    #
    # FMP Starter covers most US stocks + ETFs + forex + gold/silver at 1h
    # and 4h with 5+ years of intraday history. The per-(symbol, interval)
    # support map lives in src/api/fmp_ohlc.SUPPORT. For the handful of
    # symbols FMP Starter does NOT cover at the requested interval
    # (^GDAXI, ^FCHI fully blocked; indices at 4h; OIL/COPPER at 1h)
    # the Yahoo 1h → 4h resample fallback still applies — which inherits
    # Yahoo's ~7-month 1h cap. The engine-level safety cap at
    # strategy_engine.walk_forward_validate truncates those fallback
    # requests and emits an INFO log.
    # ──────────────────────────────────────────────────────────────────
    asset_class_windows:
      crypto_1h:             { train: 365, test: 365 }
      crypto_4h:             { train: 365, test: 365 }
      crypto_1d:             { train: 365, test: 365 }
      crypto_1d_longhorizon: { train: 730, test: 730 }
      non_crypto_1d:         { train: 730, test: 365 }
      non_crypto_1h:         { train: 365, test: 365 }   # widened from 180/90 — FMP serves 5y of 1h
      non_crypto_4h:         { train: 365, test: 365 }   # widened from 240/120 — FMP serves 5y of 4h
    # Templates that get the longhorizon crypto_1d window (previously a
    # hardcoded set inside strategy_proposer.py). Add / remove by name.
    long_horizon_templates:
      - Crypto 21W MA Trend Follow
      - Crypto Vol-Compression Momentum
      - Crypto Weekly Trend Follow
      - Crypto Golden Cross
    direction_aware_thresholds:
      default:
        min_return: 0.0
        min_sharpe: 0.3
        min_win_rate: 0.45
      ranging:
        long:
          min_return: -0.02
          min_sharpe: 0.15
          min_win_rate: 0.4
        short:
          min_return: 0.0
          min_sharpe: 0.3
          min_win_rate: 0.45
      trending_up:
        long:
          min_return: 0.0
          min_sharpe: 0.3
          min_win_rate: 0.45
        short:
          min_return: -0.02
          min_sharpe: 0.15
          min_win_rate: 0.4
      trending_down:
        long:
          min_return: -0.02
          min_sharpe: 0.15
          min_win_rate: 0.4
        short:
          min_return: 0.0
          min_sharpe: 0.3
          min_win_rate: 0.45
      high_vol:
        long:
          min_return: -0.01
          min_sharpe: 0.2
          min_win_rate: 0.42
        short:
          min_return: -0.01
          min_sharpe: 0.2
          min_win_rate: 0.42
