[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

# Custom markers for test organization
markers =
    integration: Integration tests that use real components and data (slower, run before deployment)
    slow: Tests that take longer to execute (e.g., real API calls, large data processing)
    unit: Fast unit tests with mocks (default, run in CI/CD)
    pbt: Property-based tests using hypothesis
    
# Test execution order
# 1. Run unit tests first (fast feedback)
# 2. Run integration tests before deployment (real validation)
# 3. Run slow tests in nightly builds
