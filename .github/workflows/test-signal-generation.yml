name: Signal Generation Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/strategy/**'
      - 'src/risk/**'
      - 'src/data/**'
      - 'tests/test_signal_generation*.py'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/strategy/**'
      - 'src/risk/**'
      - 'src/data/**'
      - 'tests/test_signal_generation*.py'

jobs:
  unit-tests:
    name: Unit Tests (Fast)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run unit tests
      run: |
        pytest tests/test_signal_generation.py -v --cov=src/strategy --cov-report=term-missing
    
    - name: Check test coverage
      run: |
        pytest tests/test_signal_generation.py --cov=src/strategy --cov-fail-under=80

  integration-tests:
    name: Integration Tests (Real Data)
    runs-on: ubuntu-latest
    needs: unit-tests  # Only run if unit tests pass
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    
    - name: Set up credentials
      env:
        ETORO_DEMO_PUBLIC_KEY: ${{ secrets.ETORO_DEMO_PUBLIC_KEY }}
        ETORO_DEMO_USER_KEY: ${{ secrets.ETORO_DEMO_USER_KEY }}
      run: |
        mkdir -p config
        python -c "
from src.core.config import get_config
from src.models import TradingMode
config = get_config()
config.save_credentials(
    TradingMode.DEMO,
    '${{ secrets.ETORO_DEMO_PUBLIC_KEY }}',
    '${{ secrets.ETORO_DEMO_USER_KEY }}'
)
"
    
    - name: Run integration tests
      run: |
        pytest tests/test_signal_generation_integration.py -v -m integration
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: integration-test-results
        path: test-results/

  deployment-gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: All tests passed
      run: |
        echo "✅ All signal generation tests passed"
        echo "✅ Unit tests: PASSED"
        echo "✅ Integration tests: PASSED"
        echo "✅ Ready for deployment"
    
    - name: Create deployment marker
      run: |
        echo "SIGNAL_GENERATION_TESTS_PASSED=true" >> $GITHUB_ENV
        echo "DEPLOYMENT_APPROVED=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV
