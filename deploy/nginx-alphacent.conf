server {
    server_name alphacent.co.uk www.alphacent.co.uk;
    root /home/ubuntu/alphacent/frontend/dist;

    # Static assets - serve directly
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /vite.svg {
        expires 30d;
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # Backend API routes — exact path matches (no trailing slash)
    # NOTE: 'autonomous' and 'analytics' are intentionally excluded here — they
    # are frontend SPA routes. Sub-paths like /analytics/alpha and
    # /autonomous/cycle are covered by the prefix block below.
    location ~ ^/(auth|control|config|account|strategies|orders|market-data|system|performance|risk|signals|alerts|positions|dashboard|data-management|data|sync|fundamental-check|health)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location ~ ^/(auth|control|config|account|strategies|orders|market-data|system|autonomous|analytics|performance|risk|signals|alerts|positions|dashboard|data-management|data|sync|fundamental-check|live)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Everything else: serve index.html (SPA routing)
    # index.html is never cached — always re-fetched so new JS chunks are picked up
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location / {
        try_files $uri /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/alphacent.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alphacent.co.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.alphacent.co.uk) {
        return 301 https://$host$request_uri;
    }
    if ($host = alphacent.co.uk) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name alphacent.co.uk www.alphacent.co.uk;
    return 404;
}
